specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Canada Post
providerId: canada-post
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - Logistics / Shipping
  - Postal
  - E-Commerce
description: Canada Post Developer Program registration is free. The core shipping,
  rating, tracking, pickup, and returns APIs are free to access; production shipments
  incur standard Canada Post postage charges based on service, weight, and destination.
  AddressComplete (address validation) is billed separately on a prepaid credit model
  with tiered pricing per lookup. No formal subscription tiers exist for the shipping
  APIs — usage is metered through actual postage billed to a Canada Post account or
  credit card.
sources:
  - https://www.canadapost-postescanada.ca/info/mc/business/productsservices/developers/services/gettingstarted.jsf
  - https://www.canadapost-postescanada.ca/ac/pricing/
plans:
  - id: canada-post-free-developer
    name: Free Developer Program
    type: free
    description: Free registration to the Canada Post Developer Program. Includes sandbox
      and production API keys, access to all shipping, tracking, rating, pickup, and
      returns web services. Production shipment costs are billed at standard Canada Post
      postage rates; API access itself is free.
    entries:
      - label: Developer registration
        name: registration
        type: free
        metric: account
        limit: -1
        timeFrame: month
        geo: CA
        unit: 1
        price: 0
        userMultiplied: false
    elements:
      - name: Sandbox environment (ct.soa-gw.canadapost.ca)
      - name: Production environment (soa-gw.canadapost.ca)
      - name: API keys for sandbox and production
      - name: Rating Web Service (no charge per call)
      - name: Contract Shipping Web Service
      - name: Non-Contract Shipping Web Service
      - name: Tracking Web Service
      - name: Pickup Web Service
      - name: Returns Web Service
      - name: Find a Post Office API
      - name: Deliver to Post Office API
      - name: Service Information API
      - name: Code samples in Java, PHP, and C#
      - name: Developer forum access
  - id: canada-post-addresscomplete-entry
    name: AddressComplete Entry
    type: paid
    description: Prepaid credit bundle for 300 Canadian address lookups via the AddressComplete
      API. Credits expire after 12 months or when exhausted, whichever comes first.
      International address lookups cost an additional 1 cent per lookup on top of the
      base rate.
    entries:
      - label: 300 lookups
        name: entry-300
        type: prepaid
        metric: lookup
        limit: 300
        timeFrame: year
        geo: CA
        unit: 1
        price: 0.116
        userMultiplied: false
    elements:
      - name: 300 Canadian address lookups
      - name: International lookups at +1¢ each
      - name: Auto top-up available
      - name: Balance alerts at 20%, 10%, and 5% thresholds
